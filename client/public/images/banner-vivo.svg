<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)"/>
  
  <!-- Left Side: Phones (Simplified) -->
  <g transform="translate(100, 30)">
    <!-- Phone 1 (White) -->
    <rect x="0" y="10" width="100" height="210" rx="15" fill="#f1f0ea" stroke="#d4d4d4" stroke-width="2" filter="url(#shadow)"/>
    <rect x="5" y="15" width="90" height="80" rx="10" fill="#e2dfd3" />
    <circle cx="30" cy="40" r="12" fill="#333"/>
    <circle cx="30" cy="70" r="12" fill="#333"/>
    <circle cx="65" cy="55" r="8" fill="#111"/>
    <text x="30" y="180" font-family="Arial, sans-serif" font-size="14" fill="#999" transform="rotate(-90 30,180)">vivo</text>
    
    <!-- Phone 2 (Rose/Red) -->
    <rect x="60" y="20" width="100" height="210" rx="15" fill="#c36f66" stroke="#a5554e" stroke-width="2" filter="url(#shadow)"/>
    <rect x="65" y="25" width="90" height="80" rx="10" fill="#b05c53" />
    <circle cx="90" cy="50" r="12" fill="#222"/>
    <circle cx="90" cy="80" r="12" fill="#222"/>
    <circle cx="125" cy="65" r="8" fill="#111"/>
    <text x="90" y="190" font-family="Arial, sans-serif" font-size="14" fill="#a5554e" transform="rotate(-90 90,190)">vivo</text>
  </g>
  
  <!-- Top Left Logo -->
  <text x="30" y="40" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#111">vivo</text>
  
  <!-- Center: Text -->
  <text x="550" y="110" font-family="Arial, sans-serif" font-weight="900" font-size="56" fill="#883b38" text-anchor="middle" letter-spacing="2">vivo V70 Series</text>
  <text x="550" y="180" font-family="Arial, sans-serif" font-weight="bold" font-size="42" fill="#58312e" text-anchor="middle">Exclusive Available</text>
  
  <!-- Right Side: Offers Box -->
  <rect x="850" y="30" width="320" height="220" rx="10" fill="#ffffff" stroke="#dcdcdc" stroke-width="2" filter="url(#shadow)"/>
  <rect x="910" y="20" width="200" height="25" rx="5" fill="#4a4a4a"/>
  <text x="1010" y="37" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#fff" text-anchor="middle">Own Easily with Exclusive Offers</text>
  
  <!-- Inner box items -->
  <g transform="translate(860, 60)">
    <text x="10" y="30" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#a0302b">10%</text>
    <text x="60" y="30" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#333">Cashback</text>
    <line x1="130" y1="10" x2="130" y2="40" stroke="#ccc" stroke-width="1"/>
    
    <text x="140" y="20" font-family="Arial, sans-serif" font-weight="900" font-size="18" fill="#333">18 Months</text>
    <text x="140" y="35" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#777">ZERO Down Payment</text>
  </g>
  
  <g transform="translate(860, 130)">
    <rect x="10" y="0" width="40" height="40" rx="5" fill="#2c3440" />
    <text x="60" y="15" font-family="Arial, sans-serif" font-weight="bold" font-size="12" fill="#333">TWS 3e ANC</text>
    <text x="60" y="35" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#333">At ₹599</text>
  </g>
  
  <g transform="translate(860, 200)">
    <text x="10" y="0" font-family="Arial, sans-serif" font-weight="900" font-size="46" fill="#111">60%</text>
    <text x="100" y="-15" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#111">Assured</text>
    <text x="100" y="0" font-family="Arial, sans-serif" font-weight="bold" font-size="14" fill="#111">Buyback</text>
  </g>
</svg>
